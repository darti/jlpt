name: Qualité — contenu, types, tests

# Garde-fou unique du dépôt, à chaque push / PR. Avant, ce workflow ne validait QUE
# data/*.json : un test rouge ou une erreur de type partait en prod sans qu'aucun check
# ne rougisse (deploy.yml ne fait que `bun run build`, et `bun build` NE TYPECHECK PAS).
#
#  1. data/*.json  : dict (pas de niveau JLPT comme définition, pas de clé dupliquée,
#                    champs r/m…), bank/grammar/kanji/vocab (structure, bornes, options) ;
#  2. dérivés      : data/bank-*.json + bank-index.json toujours en phase avec bank.json ;
#  3. types        : tsc --noEmit sur src/ + scripts/ ;
#  4. tests        : la suite bun test.

on:
  push:
  pull_request:
  workflow_dispatch:

# Ce job ne fait que lire le dépôt et lancer des checks : aucun droit d'écriture.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node est VOLONTAIRE ici : tools/*.mjs doit rester exécutable sous node (aucune API
      # Bun.*). Faire tourner validate.mjs sous node est ce qui vérifie cet invariant —
      # ne pas « harmoniser » cette étape vers bun, on perdrait le seul détecteur. Le reste
      # du dépôt est bun-only (cf. CLAUDE.md).
      - name: Node (pour tools/*.mjs uniquement)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Valider tout le contenu (data/*.json)
        run: node tools/validate.mjs

      - name: Installer Bun
        uses: oven-sh/setup-bun@v2

      # bank-*.json / bank-index.json sont DÉRIVÉS de bank.json. Éditer un dérivé (ou
      # oublier de régénérer après édition de la source) partait sinon en prod tel quel.
      - name: Vérifier les banques dérivées (bank-*.json)
        run: bun tools/split-bank.mjs --check

      - name: Installer les dépendances
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Tests
        run: bun test
