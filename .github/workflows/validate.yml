name: Qualité — contenu, types, tests

# Garde-fou unique du dépôt, à chaque push / PR. Avant, ce workflow ne validait QUE
# data/*.json : un test rouge ou une erreur de type partait en prod sans qu'aucun check
# ne rougisse (deploy.yml ne fait que `bun run build`, et `bun build` NE TYPECHECK PAS).
#
#  1. data/graph/  : shapes SHACL (sous-ensemble Oku) + contrôles impératifs — bornes de
#                    answer, alignement optionNote, ordinaux denses, IRIs pendantes,
#                    réponses contradictoires, leçons qui ne couvrent rien ;
#  2. types        : tsc --noEmit sur src/ + scripts/ ;
#  3. tests        : la suite bun test.
#
# UN SEUL validateur : data/ ne contient plus que data/graph/. Les étapes « banques
# dérivées » et « contenu de cours » ont disparu avec les fichiers qu'elles gardaient —
# ce qui n'existe plus ne peut pas se désynchroniser.

on:
  push:
  pull_request:
  workflow_dispatch:

# Ce job ne fait que lire le dépôt et lancer des checks : aucun droit d'écriture.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Bun
        uses: oven-sh/setup-bun@v2

      # data/graph/ est ce que l app lit au runtime. Sous bun comme TOUT le reste du dépôt :
      # l installation dun second runtime a disparu, plus rien ici nen exige (cf. CLAUDE.md).
      - name: Valider le graphe JSON-LD (data/graph/)
        run: bun tools/validate-graph.mjs

      - name: Installer les dépendances
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Tests
        run: bun test
