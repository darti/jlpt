name: Validation du contenu

# Vérifie la source de vérité du contenu (data/*.json) à chaque push / PR :
#  - data/dict.json respecte les règles (pas de niveau JLPT comme définition,
#    pas de clé dupliquée, champs r/m présents…) ;
#  - bank/grammar/kanji/vocab.json : structure, bornes, options valides.
# Ne bloque pas le déploiement (workflow séparé) mais signale toute régression.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Valider tout le contenu (data/*.json)
        run: node tools/validate.mjs

      # Migration SPA terminée : dict.js/cours-n3.html/examples.json + leurs sync-*.mjs
      # ont été supprimés (le runtime React charge data/dict.json et data/cours-*.json
      # directement). Seule la validation des sources data/*.json reste pertinente.
