name: Déploiement GitHub Pages

# Publie l'application JLPT N3 (fichiers HTML statiques) sur GitHub Pages.
# Prérequis côté dépôt : Settings → Pages → "Build and deployment" → Source = "GitHub Actions".

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on n'annule pas un déploiement en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://darti.github.io/jlpt/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer Pages
        # PRÉREQUIS (une fois) : Settings → Pages → Build and deployment → Source = "GitHub Actions".
        # L'auto-activation (enablement) est impossible : le GITHUB_TOKEN n'a pas le droit de créer le site Pages ici.
        uses: actions/configure-pages@v5

      - name: Installer Bun
        uses: oven-sh/setup-bun@v2

      - name: Construire (Bun) + préparer l'artefact
        run: |
          bun install --frozen-lockfile
          bun run build          # génère _site/index.html + _site/quiz.html (React) + assets hashés
          # Pages encore en vanilla : copiées telles quelles
          cp app-n3.html cours-n3.html planning-n3.html _site/
          cp theme.css progress.js dict.js vocab-data.js _site/
          cp manifest.webmanifest sw.js icon-180.png icon-192.png icon-512.png _site/
          cp README.md _site/ 2>/dev/null || true
          # Banque de questions du quiz : fetchée en relatif (data/bank-*.json), donc
          # doit vivre sous _site/data/, pas à la racine de _site/.
          mkdir -p _site/data
          cp data/bank-*.json data/bank-index.json _site/data/

      - name: Téléverser l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      # L'API Pages renvoie parfois « Deployment failed, try again later »
      # (incident transitoire côté GitHub). On réessaie jusqu'à 3 fois.
      - name: Déployer sur GitHub Pages (essai 1)
        id: dep1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Pause avant réessai
        if: steps.dep1.outcome == 'failure'
        run: sleep 15

      - name: Déployer sur GitHub Pages (essai 2)
        id: dep2
        if: steps.dep1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Pause avant dernier essai
        if: steps.dep1.outcome == 'failure' && steps.dep2.outcome == 'failure'
        run: sleep 25

      - name: Déployer sur GitHub Pages (essai 3)
        id: dep3
        if: steps.dep1.outcome == 'failure' && steps.dep2.outcome == 'failure'
        uses: actions/deploy-pages@v4
